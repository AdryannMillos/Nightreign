<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR Calibration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: rgba(0, 0, 0, 0.35);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }

    #instructions {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 12, 8, 0.9);
      border: 1px solid rgba(201, 168, 76, 0.5);
      border-radius: 8px;
      padding: 16px 28px;
      text-align: center;
      color: #e8dcc8;
      z-index: 10;
    }

    #instructions h2 {
      font-size: 14px;
      color: #c9a84c;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #step-label {
      font-size: 10px;
      color: #887858;
      margin-bottom: 4px;
    }

    #instructions p {
      font-size: 12px;
      color: #a89878;
      line-height: 1.5;
    }

    #instructions .key {
      display: inline-block;
      background: rgba(201, 168, 76, 0.2);
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 11px;
      color: #c9a84c;
    }

    .highlight {
      color: #c9a84c;
      font-weight: 700;
    }

    #selection {
      position: fixed;
      border: 2px solid #c9a84c;
      background: rgba(201, 168, 76, 0.1);
      display: none;
      pointer-events: none;
      z-index: 5;
    }

    #selection-info {
      position: fixed;
      background: rgba(15, 12, 8, 0.85);
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 10px;
      color: #c9a84c;
      display: none;
      pointer-events: none;
      z-index: 6;
    }

    .saved-region {
      position: fixed;
      border: 2px dashed rgba(92, 184, 92, 0.7);
      background: rgba(92, 184, 92, 0.08);
      pointer-events: none;
      z-index: 4;
    }

    .saved-label {
      position: fixed;
      background: rgba(15, 12, 8, 0.85);
      border: 1px solid rgba(92, 184, 92, 0.4);
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 9px;
      color: #5cb85c;
      pointer-events: none;
      z-index: 4;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <div id="step-label">STEP 1 of 2</div>
    <h2 id="title">Rune Counter Region</h2>
    <p id="desc">
      Draw a rectangle over the <span class="highlight">rune counter number</span> (top-right of the screen).<br>
      Press <span class="key">ESC</span> to cancel.
    </p>
  </div>

  <div id="selection"></div>
  <div id="selection-info"></div>

  <script>
    const selEl = document.getElementById('selection');
    const infoEl = document.getElementById('selection-info');
    const stepLabel = document.getElementById('step-label');
    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');

    let step = 'runes'; // 'runes' -> 'level'
    let startX = 0, startY = 0;
    let isDragging = false;

    document.addEventListener('mousedown', (e) => {
      startX = e.screenX;
      startY = e.screenY;
      isDragging = true;

      selEl.style.left = `${e.clientX}px`;
      selEl.style.top = `${e.clientY}px`;
      selEl.style.width = '0px';
      selEl.style.height = '0px';
      selEl.style.display = 'block';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const cx = Math.min(e.clientX, startX - window.screenX);
      const cy = Math.min(e.clientY, startY - window.screenY);
      const w = Math.abs(e.clientX - (startX - window.screenX));
      const h = Math.abs(e.clientY - (startY - window.screenY));

      selEl.style.left = `${cx}px`;
      selEl.style.top = `${cy}px`;
      selEl.style.width = `${w}px`;
      selEl.style.height = `${h}px`;

      infoEl.style.display = 'block';
      infoEl.style.left = `${cx + w + 8}px`;
      infoEl.style.top = `${cy}px`;
      infoEl.textContent = `${Math.round(w)} x ${Math.round(h)}`;
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      isDragging = false;

      const endX = e.screenX;
      const endY = e.screenY;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const width = Math.abs(endX - startX);
      const height = Math.abs(endY - startY);

      if (width < 10 || height < 10) return;

      const region = {
        x: Math.round(x),
        y: Math.round(y),
        width: Math.round(width),
        height: Math.round(height),
      };

      window.nightreign.sendCalibrationRegion(step, region);

      if (step === 'runes') {
        // Show saved region marker
        const marker = document.createElement('div');
        marker.className = 'saved-region';
        marker.style.left = `${selEl.style.left}`;
        marker.style.top = `${selEl.style.top}`;
        marker.style.width = `${selEl.style.width}`;
        marker.style.height = `${selEl.style.height}`;
        document.body.appendChild(marker);

        const label = document.createElement('div');
        label.className = 'saved-label';
        label.textContent = 'RUNES ✓';
        label.style.left = selEl.style.left;
        label.style.top = `${parseInt(selEl.style.top) - 18}px`;
        document.body.appendChild(label);

        // Move to step 2
        step = 'level';
        stepLabel.textContent = 'STEP 2 of 2';
        titleEl.textContent = 'Level Number Region';
        descEl.innerHTML =
          'Now draw a rectangle over the <span class="highlight">level number</span> (top-left, the number near the health bar).<br>' +
          'Press <span class="key">ESC</span> to cancel.';

        selEl.style.display = 'none';
        infoEl.style.display = 'none';
      }
      // After level step, main process will close this window
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });
  </script>
</body>
</html>
